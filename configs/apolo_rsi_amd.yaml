# configs/apolo_rsi_amd.yaml
strategy_path: "src.core.strategies.apolo_rsi:ApoloRSI"
config_path: "src.core.strategies.apolo_rsi:ApoloRSIConfig"

config:
  # Data identification - matches catalog structure
  instrument_id: "AMD.NASDAQ"
  bar_type: "AMD.NASDAQ-1-DAY-LAST-EXTERNAL"

  # Position sizing parameters
  portfolio_value: 100000  # Should match backtest.initial_capital
  position_size_pct: 10.0  # 10% of portfolio per trade

  # Strategy parameters
  order_id_tag: "APOLO-AMD"
  rsi_period: 2
  # Note: Nautilus RSI returns values in 0-1 range (not 0-100)
  buy_threshold: 0.10
  sell_threshold: 0.50

# Optional backtest settings
backtest:
  start_date: "2023-12-29"
  end_date: "2024-12-31"
  initial_capital: 100000
